<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Maya · Yanbal</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- FrYDA Design System — tokens CSS oficiales, versionados (checklist 1.5: orden
       foundation → semantic → component → variables; nunca /latest/ en producción).
       Los primitives locales (fryda-primitives.scss) los referencian con fallback. -->
    <link rel="preconnect" href="https://frydacdn.yanbal.com" />
    <link rel="stylesheet" href="https://frydacdn.yanbal.com/styles/1.2.0/foundation.css" />
    <link rel="stylesheet" href="https://frydacdn.yanbal.com/styles/1.2.0/semantic.css" />
    <link rel="stylesheet" href="https://frydacdn.yanbal.com/styles/1.2.0/component.css" />
    <link rel="stylesheet" href="https://frydacdn.yanbal.com/styles/1.2.0/variables.css" />
    <meta name="theme-color" content="#ffffff" />
    <!-- Aplica el tema guardado antes del primer render para evitar parpadeo (FOUC) -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('maya-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#131110' : '#ffffff');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
