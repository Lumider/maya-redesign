# Especificación del proyecto Xcode para iOS (widget + app), generado con XcodeGen.
#
#   brew install xcodegen      # una sola vez
#   xcodegen generate
#   open CampanasYanbal.xcodeproj
#
# El motor de cálculo vive como paquete Swift local dentro de este mismo repo
# (carpeta CampaignKit/), así que el proyecto es 100% autocontenido.
name: CampanasYanbal

options:
  bundleIdPrefix: com.gcharca.campanasyanbal
  deploymentTarget:
    iOS: "17.0"

packages:
  CampaignKit:
    path: CampaignKit

targets:
  # --- App contenedora (necesaria para poder instalar el widget) ---
  CampanasYanbal:
    type: application
    platform: iOS
    sources:
      - App/Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Campañas Yanbal
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: CampaignKit
        product: CampaignKit
      - target: CampanasWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gcharca.campanasyanbal
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic

  # --- Extensión de widget (WidgetKit) ---
  CampanasWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget/Sources
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Campaña Yanbal
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: CampaignKit
        product: CampaignKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gcharca.campanasyanbal.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
