# Especificación del proyecto Xcode para iOS (widget + app), generado con XcodeGen.
#
#   brew install xcodegen      # una sola vez
#   cd ios && xcodegen generate
#   open CampanasYanbal.xcodeproj
#
# Comparte el motor CampaignKit con el proyecto macOS a través del paquete Swift
# de la carpeta superior (path: ..).
name: CampanasYanbal

options:
  bundleIdPrefix: com.gcharca.campanasyanbal
  deploymentTarget:
    iOS: "17.0"

packages:
  CampaignKit:
    # Reutiliza el mismo paquete que la app de macOS (Package.swift en la raíz del repo).
    path: ..

targets:
  # --- App contenedora (necesaria para poder instalar el widget) ---
  CampanasYanbal:
    type: application
    platform: iOS
    sources:
      - App/Sources
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Campañas Yanbal
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies:
      - package: CampaignKit
        product: CampaignKit
      - target: CampanasWidgetExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gcharca.campanasyanbal
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        # Firma automática: en Xcode elige tu equipo (Apple ID) en Signing & Capabilities.
        CODE_SIGN_STYLE: Automatic

  # --- Extensión de widget (WidgetKit) ---
  CampanasWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - Widget/Sources
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Campaña Yanbal
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: CampaignKit
        product: CampaignKit
    settings:
      base:
        # El id del widget DEBE tener como prefijo el id de la app.
        PRODUCT_BUNDLE_IDENTIFIER: com.gcharca.campanasyanbal.widget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
